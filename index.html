<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-Calculator</title>
    <link rel="stylesheet" href="./stlyle.css">
</head>
<body>
    <!-- <div class="whole"> -->
        <h1 class="name">P-CALCULATOR</h1>
            <div class="calco">
                    <div id="display">

                    </div>
                    <div class="buttons">
                        <button class="special">AC</button>
                        <button class="special">(</button>
                        <button class="special">)</button>
                        <button class="special">&larr;</button>
                        <button>7</button>
                        <button>8</button>
                        <button>9</button>
                        <button class="special">+</button>
                        <button>4</button>
                        <button>5</button>
                        <button>6</button>
                        <button class="special">-</button>
                        <button>1</button>
                        <button>2</button>
                        <button>3</button>
                        <button class="special">*</button>
                        <button class="special">%</button>
                        <button>0</button>
                        <button class="special">.</button>
                        <button class="special">/</button>
                    </div>
                    <div class="buttonp">
                        <button class="special" id="equal">=</button>
                    </div>
            </div>
    <!-- </div> -->
    <script src="./java.js"></script>
</body>
</html>
